<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Should I watch it? — Movie App</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@200;400;600;700&display=swap" rel="stylesheet" />
    <style>
        /* ===== RESET & BASE ===== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Poppins", sans-serif;
            background: #f5ede4;
            /* warm clay base */
            background-image: radial-gradient(ellipse at 20% 50%, #faf3eb 0%, #ece1d6 100%);
            min-height: 100vh;
            margin: 0;
            padding: 1.5rem 1.5rem 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ===== MAIN WRAPPER ===== */
        .app-wrapper {
            max-width: 1400px;
            width: 100%;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        /* ===== CLAYMORPHISM UTILITY ===== */
        .clay {
            background: #f6efe8;
            border-radius: 32px;
            box-shadow:
                8px 8px 16px rgba(180, 160, 145, 0.25),
                -6px -6px 14px rgba(255, 248, 240, 0.85),
                inset 2px 2px 4px rgba(255, 248, 240, 0.7),
                inset -3px -3px 8px rgba(180, 160, 145, 0.15);
            transition: box-shadow 0.25s ease, transform 0.25s ease;
        }

        .clay-pressed {
            background: #efe7de;
            border-radius: 32px;
            box-shadow:
                inset 6px 6px 14px rgba(180, 160, 145, 0.25),
                inset -4px -4px 10px rgba(255, 248, 240, 0.7),
                2px 2px 6px rgba(255, 248, 240, 0.3);
        }

        /* ===== HEADER ===== */
        header {
            padding: 1.2rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            background: #f2e9e0;
            border-radius: 40px;
            box-shadow:
                10px 10px 24px rgba(180, 160, 145, 0.25),
                -8px -8px 20px rgba(255, 248, 240, 0.85),
                inset 2px 2px 6px rgba(255, 248, 240, 0.7),
                inset -4px -4px 10px rgba(180, 160, 145, 0.12);
            margin-bottom: 2.2rem;
            transition: box-shadow 0.3s ease;
        }

        header:hover {
            box-shadow:
                12px 12px 28px rgba(180, 160, 145, 0.28),
                -10px -10px 24px rgba(255, 248, 240, 0.9),
                inset 2px 2px 6px rgba(255, 248, 240, 0.7),
                inset -4px -4px 10px rgba(180, 160, 145, 0.12);
        }

        .logo-group {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo-icon {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #dccfc2;
            box-shadow:
                inset 3px 3px 8px rgba(255, 248, 240, 0.8),
                inset -4px -4px 10px rgba(150, 130, 115, 0.25),
                4px 4px 10px rgba(150, 130, 115, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            color: #5a4c3e;
            user-select: none;
        }

        header h1 {
            color: #3d352e;
            font-weight: 600;
            font-size: 1.6rem;
            letter-spacing: -0.3px;
            padding: 0;
            margin: 0;
            text-shadow: 1px 1px 2px rgba(255, 248, 240, 0.7);
        }
        header h1 span {
            font-weight: 200;
            color: #7a6b5d;
        }

        /* ===== SEARCH ===== */
        .search-wrap {
            position: relative;
            border-radius: 60px;
            background: #f2e9e0;
            box-shadow:
                inset 5px 5px 14px rgba(180, 160, 145, 0.2),
                inset -4px -4px 12px rgba(255, 248, 240, 0.8),
                2px 2px 6px rgba(255, 248, 240, 0.3);
            transition: box-shadow 0.25s ease;
        }

        .search-wrap:focus-within {
            box-shadow:
                inset 5px 5px 14px rgba(180, 160, 145, 0.25),
                inset -4px -4px 12px rgba(255, 248, 240, 0.9),
                0 0 0 3px rgba(200, 180, 165, 0.3);
        }

        .search {
            background: transparent;
            border: none;
            border-radius: 60px;
            font-family: inherit;
            font-size: 0.95rem;
            padding: 0.8rem 1.6rem;
            color: #3d352e;
            width: 240px;
            outline: none;
        }

        .search::placeholder {
            color: #b0a292;
            font-weight: 300;
            letter-spacing: 0.2px;
        }

        .search-btn {
            position: absolute;
            right: 6px;
            top: 50%;
            transform: translateY(-50%);
            background: #dccfc2;
            border: none;
            border-radius: 50%;
            width: 38px;
            height: 38px;
            font-size: 1.1rem;
            cursor: pointer;
            color: #4a3f35;
            box-shadow:
                inset 2px 2px 6px rgba(255, 248, 240, 0.8),
                inset -3px -3px 8px rgba(150, 130, 115, 0.2),
                2px 2px 6px rgba(150, 130, 115, 0.1);
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .search-btn:hover {
            background: #d4c5b6;
            box-shadow:
                inset 3px 3px 8px rgba(255, 248, 240, 0.7),
                inset -4px -4px 10px rgba(150, 130, 115, 0.25),
                2px 2px 8px rgba(150, 130, 115, 0.12);
            transform: translateY(-50%) scale(1.04);
        }

        .search-btn:active {
            transform: translateY(-50%) scale(0.94);
            box-shadow:
                inset 4px 4px 12px rgba(150, 130, 115, 0.25),
                inset -2px -2px 6px rgba(255, 248, 240, 0.7);
        }

        /* ===== MAIN GRID ===== */
        main {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 2rem;
            padding: 0.5rem 0 2rem;
            flex: 1;
        }

        /* ===== MOVIE CARD — CLAYMORPHISM ===== */
        .movie {
            width: 280px;
            background: #f6efe8;
            border-radius: 32px;
            box-shadow:
                10px 10px 24px rgba(180, 160, 145, 0.25),
                -8px -8px 20px rgba(255, 248, 240, 0.85),
                inset 2px 2px 6px rgba(255, 248, 240, 0.7),
                inset -4px -4px 10px rgba(180, 160, 145, 0.10);
            overflow: hidden;
            transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            transform: translateY(0);
            cursor: pointer;
        }

        .movie:hover {
            transform: translateY(-8px) scale(1.01);
            box-shadow:
                16px 16px 36px rgba(180, 160, 145, 0.30),
                -12px -12px 28px rgba(255, 248, 240, 0.9),
                inset 2px 2px 6px rgba(255, 248, 240, 0.7),
                inset -4px -4px 10px rgba(180, 160, 145, 0.10);
        }

        .movie img {
            width: 100%;
            display: block;
            border-radius: 32px 32px 0 0;
            background: #e8ddd0;
        }

        .movie-info {
            padding: 1.1rem 1.4rem 1.4rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.75rem;
            background: #f6efe8;
            border-radius: 0 0 32px 32px;
        }

        .movie-info h3 {
            margin: 0;
            font-size: 1rem;
            font-weight: 600;
            color: #3d352e;
            letter-spacing: -0.2px;
            line-height: 1.3;
            flex: 1;
            text-shadow: 0 1px 2px rgba(255, 248, 240, 0.5);
        }

        .movie-info .rating {
            background: #efe7de;
            padding: 0.3rem 0.75rem;
            border-radius: 40px;
            font-weight: 700;
            font-size: 0.85rem;
            box-shadow:
                inset 2px 2px 6px rgba(180, 160, 145, 0.15),
                inset -3px -3px 8px rgba(255, 248, 240, 0.7),
                2px 2px 6px rgba(180, 160, 145, 0.08);
            white-space: nowrap;
            transition: all 0.2s ease;
        }

        .movie-info .rating.green {
            color: #3d8b5e;
        }
        .movie-info .rating.orange {
            color: #c4843a;
        }
        .movie-info .rating.red {
            color: #b34a4a;
        }

        /* ===== OVERVIEW ===== */
        .overview {
            background: #f6efe8;
            padding: 1.4rem 1.6rem 1.8rem;
            position: absolute;
            left: 0;
            bottom: 0;
            right: 0;
            max-height: 100%;
            transform: translateY(101%);
            overflow-y: auto;
            transition: transform 0.4s cubic-bezier(0.34, 1.2, 0.64, 1);
            border-radius: 0 0 32px 32px;
            box-shadow:
                inset 0 8px 20px rgba(180, 160, 145, 0.08),
                0 -4px 16px rgba(180, 160, 145, 0.06);
            backdrop-filter: blur(2px);
        }

        .overview h3 {
            font-size: 0.95rem;
            font-weight: 600;
            color: #3d352e;
            margin: 0 0 0.5rem 0;
            letter-spacing: -0.2px;
        }

        .overview p {
            font-size: 0.85rem;
            line-height: 1.6;
            color: #5a4c3e;
            font-weight: 300;
            margin: 0;
        }

        .movie:hover .overview {
            transform: translateY(0);
        }

        /* ===== FOOTER + WATERMARK ===== */
        .footer {
            margin-top: 1.5rem;
            padding: 1.2rem 2rem;
            border-radius: 40px 40px 28px 28px;
            background: #f2e9e0;
            box-shadow:
                6px 6px 16px rgba(180, 160, 145, 0.18),
                -6px -6px 14px rgba(255, 248, 240, 0.8),
                inset 1px 1px 4px rgba(255, 248, 240, 0.6),
                inset -2px -2px 6px rgba(180, 160, 145, 0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.75rem 1.5rem;
            width: 100%;
        }

        .footer p {
            color: #7a6b5d;
            font-size: 0.8rem;
            font-weight: 300;
            margin: 0;
            letter-spacing: 0.2px;
        }

        .footer .watermark {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #b0a092;
            font-size: 0.75rem;
            font-weight: 300;
            letter-spacing: 0.6px;
            text-transform: uppercase;
        }

        .footer .watermark strong {
            font-weight: 600;
            color: #8a7a6a;
            font-size: 0.8rem;
            letter-spacing: 0.4px;
        }

        .watermark-divider {
            width: 1px;
            height: 18px;
            background: rgba(180, 160, 145, 0.25);
        }

        /* subtle floating watermark on main area */
        .watermark-float {
            position: fixed;
            bottom: 100px;
            right: 24px;
            font-size: 0.6rem;
            font-weight: 200;
            letter-spacing: 2px;
            color: rgba(180, 160, 145, 0.18);
            writing-mode: vertical-rl;
            text-orientation: mixed;
            pointer-events: none;
            user-select: none;
            z-index: 0;
            font-family: "Poppins", sans-serif;
            text-transform: uppercase;
            transition: opacity 0.6s ease;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 700px) {
            body {
                padding: 1rem 1rem 0;
            }

            header {
                flex-direction: column;
                align-items: stretch;
                padding: 1.2rem 1.5rem;
                border-radius: 32px;
            }

            .logo-group {
                justify-content: center;
            }

            header h1 {
                font-size: 1.3rem;
                text-align: center;
            }

            .search-wrap {
                width: 100%;
            }

            .search {
                width: 100%;
                padding: 0.7rem 1.2rem;
                font-size: 0.9rem;
            }

            .search-btn {
                right: 4px;
                width: 34px;
                height: 34px;
                font-size: 1rem;
            }

            .movie {
                width: 100%;
                max-width: 340px;
            }

            .footer {
                flex-direction: column;
                text-align: center;
                padding: 1rem 1.2rem;
                border-radius: 28px;
            }

            .footer .watermark {
                font-size: 0.7rem;
            }

            .watermark-float {
                display: none;
            }
        }

        @media (max-width: 420px) {
            header h1 {
                font-size: 1.1rem;
            }
            .logo-icon {
                width: 36px;
                height: 36px;
                font-size: 1.1rem;
            }
            .movie-info h3 {
                font-size: 0.9rem;
            }
            .movie-info .rating {
                font-size: 0.75rem;
                padding: 0.2rem 0.6rem;
            }
        }

        /* ===== SCROLLBAR STYLING ===== */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f2e9e0;
            border-radius: 12px;
        }
        ::-webkit-scrollbar-thumb {
            background: #d4c5b6;
            border-radius: 12px;
            box-shadow: inset 0 0 6px rgba(180, 160, 145, 0.2);
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #c4b5a6;
        }

        /* ===== ANIMATIONS ===== */
        @keyframes fadeUp {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .movie {
            animation: fadeUp 0.5s ease forwards;
        }

        .movie:nth-child(2) {
            animation-delay: 0.06s;
        }
        .movie:nth-child(3) {
            animation-delay: 0.12s;
        }
        .movie:nth-child(4) {
            animation-delay: 0.18s;
        }
        .movie:nth-child(5) {
            animation-delay: 0.24s;
        }
        .movie:nth-child(6) {
            animation-delay: 0.30s;
        }
        .movie:nth-child(7) {
            animation-delay: 0.36s;
        }
        .movie:nth-child(8) {
            animation-delay: 0.42s;
        }
        .movie:nth-child(9) {
            animation-delay: 0.48s;
        }
        .movie:nth-child(10) {
            animation-delay: 0.54s;
        }
        .movie:nth-child(11) {
            animation-delay: 0.60s;
        }
        .movie:nth-child(12) {
            animation-delay: 0.66s;
        }

        /* empty state */
        .empty-state {
            width: 100%;
            text-align: center;
            padding: 4rem 2rem;
            color: #7a6b5d;
            font-weight: 300;
            font-size: 1.1rem;
        }
        .empty-state span {
            display: block;
            font-size: 3rem;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>

    <!-- subtle floating watermark -->
    <div class="watermark-float">Sarthak Deokar</div>

    <div class="app-wrapper">
        <!-- HEADER -->
        <header>
            <div class="logo-group">
                <div class="logo-icon">🎬</div>
                <h1>Should I <span>watch it?</span></h1>
            </div>
            <div class="search-wrap">
                <input type="text" placeholder="Search movies…" id="search" class="search" />
                <button class="search-btn" id="searchBtn" aria-label="Search">🔍</button>
            </div>
        </header>

        <!-- MAIN -->
        <main id="main"></main>

        <!-- FOOTER + WATERMARK -->
        <footer class="footer">
            <p>This project uses the TMDb API but is not endorsed or certified by TMDb.</p>
            <div class="watermark">
                <span>✦</span>
                <span class="watermark-divider"></span>
                <span>crafted by <strong>Sarthak Deokar</strong></span>
            </div>
        </footer>
    </div>

    <script>
        // ===== API CONFIG =====
        const KEY = "3fd2be6f0c70a2a598f084ddfb75487c";
        const API_URL =
            `https://api.themoviedb.org/3/discover/movie?sort_by=popularity.desc&api_key=${KEY}&page=1`;
        const IMG_PATH = "https://image.tmdb.org/t/p/w1280";
        const SEARCH_API = `https://api.themoviedb.org/3/search/movie?api_key=${KEY}&query=`;

        const main = document.getElementById("main");
        const form = document.getElementById("search");
        const searchBtn = document.getElementById("searchBtn");

        // ===== RATING CLASS =====
        const getClassByRate = (vote) => {
            if (vote >= 7.5) return "green";
            if (vote >= 7) return "orange";
            return "red";
        };

        // ===== RENDER MOVIES =====
        const showMovies = (movies) => {
            main.innerHTML = "";
            if (!movies || movies.length === 0) {
                main.innerHTML = `
              <div class="empty-state">
                <span>🎭</span>
                No movies found. Try a different search!
              </div>
            `;
                return;
            }

            movies.forEach((movie) => {
                const { title, poster_path, vote_average, overview } = movie;

                const posterSrc = poster_path ?
                    IMG_PATH + poster_path :
                    "https://via.placeholder.com/280x420/e8ddd0/b0a092?text=No+Image";

                const movieEl = document.createElement("div");
                movieEl.classList.add("movie");

                movieEl.innerHTML = `
              <img src="${posterSrc}" alt="${title}" loading="lazy" />
              <div class="movie-info">
                <h3>${title}</h3>
                <span class="rating ${getClassByRate(vote_average)}">${vote_average.toFixed(1)}</span>
              </div>
              <div class="overview">
                <h3>📖 Overview</h3>
                <p>${overview || "No overview available."}</p>
              </div>
            `;
                main.appendChild(movieEl);
            });
        };

        // ===== FETCH MOVIES =====
        const getMovies = async (url) => {
            try {
                const res = await fetch(url);
                if (!res.ok) throw new Error("Network response was not ok");
                const data = await res.json();
                showMovies(data.results);
            } catch (err) {
                main.innerHTML = `
              <div class="empty-state">
                <span>⚠️</span>
                Something went wrong. Please try again later.
              </div>
            `;
                console.error("Fetch error:", err);
            }
        };

        // ===== LOAD DEFAULT =====
        getMovies(API_URL);

        // ===== SEARCH HANDLING =====
        const performSearch = () => {
            const searchTerm = form.value.trim();
            if (searchTerm !== "") {
                getMovies(SEARCH_API + encodeURIComponent(searchTerm));
                form.value = "";
            } else {
                getMovies(API_URL);
            }
        };

        form.addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
                e.preventDefault();
                performSearch();
            }
        });

        searchBtn.addEventListener("click", (e) => {
            e.preventDefault();
            performSearch();
        });

        // ===== FALLBACK: if search is empty and user hits Enter, reload default =====
        document.addEventListener("keydown", (e) => {
            if (e.key === "Enter" && document.activeElement === form && form.value.trim() === "") {
                e.preventDefault();
                getMovies(API_URL);
            }
        });

        console.log("🎬 Should I watch it? — Enhanced with claymorphism ✨");
        console.log("👤 Watermark: Sarthak Deokar");
    </script>

</body>
</html>
